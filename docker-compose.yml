version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: codevamp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: codevamp-redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
