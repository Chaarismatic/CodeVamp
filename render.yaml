services:
  - type: web
    name: codevamp-api
    env: node
    rootDir: .
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
